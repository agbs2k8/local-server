apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trmnl-agent.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trmnl-agent.labels" . | nindent 4 }}
type: Opaque
data:
  WEBHOOK_URL: {{ required "secrets.WEBHOOK_URL is required" .Values.secrets.WEBHOOK_URL | b64enc | quote }}