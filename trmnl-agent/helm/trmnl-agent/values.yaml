# Default values for trmnl-agent
# This is a YAML-formatted file.

# Image configuration
image:
  repository: trmnl-agent
  pullPolicy: IfNotPresent
  tag: "0.0.1"

# CronJob configuration
cronjob:
  # Daily at 5:00 AM America/Chicago (Central time, DST-aware)
  schedule: "0 5 * * *"
  timeZone: "America/Chicago"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  restartPolicy: OnFailure
  backoffLimit: 2
  activeDeadlineSeconds: 600  # 10 minutes timeout

# Application configuration
config:
  APP_NAME: "trmnl-agent"
  LOG_LEVEL: "INFO"
  SOURCE_URL: "https://www.accuweather.com/en/us/lakeville/55044/sinus-weather/2247734"
  PULL_RETRY: "3"

# Secret configuration (for sensitive data)
secrets:
  WEBHOOK_URL: ""

# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Node selector and tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}
