# Default values for pihole
# This is a YAML-formatted file

# Number of Pi-hole replicas - set to 1 to avoid database conflicts
replicaCount: 1

image:
  repository: pihole/pihole
  tag: latest
  pullPolicy: Always

# Environment variables (can be overridden by .env file)
env:
  TZ: "UTC"
  FTLCONF_webserver_api_password: ""  # Empty will generate random password
  FTLCONF_dns_listeningMode: "ALL"
  FTLCONF_dns_upstreams: "8.8.8.8;8.8.4.4"
  FTLCONF_dns_dnssec: "true"
  FTLCONF_dns_queryLogging: "true"
  FTLCONF_dns_privacyLevel: "0"
  PIHOLE_UID: "1000"
  PIHOLE_GID: "1000"

# Service configuration
service:
  # DNS service (internal to cluster)
  dns:
    type: ClusterIP
    port: 53
    annotations: {}
    # Use hostPort to bind directly to host port 53
    hostPort:
      enabled: true
      tcp: 53
      udp: 53
  
  # Web interface service
  web:
    type: LoadBalancer
    httpPort: 80
    httpsPort: 443
    annotations: {}
    # For specific LoadBalancer IP (optional)
    # loadBalancerIP: "192.168.1.100"

# Ingress for web interface (alternative to LoadBalancer)
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: pihole.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: pihole-tls
  #    hosts:
  #      - pihole.local

# Persistent storage for each Pi-hole instance
persistence:
  enabled: true
  storageClass: ""  # Use default storage class
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}

# Resource limits and requests
resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 128Mi
    cpu: 100m

# Security context for container
securityContext:
  # Required capabilities for Pi-hole
  capabilities:
    add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - CHOWN
      - NET_BIND_SERVICE
      - NET_RAW
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
  runAsUser: 0  # Run as root to avoid permission issues
  runAsGroup: 0
  allowPrivilegeEscalation: true

# Pod Security Context - less restrictive for Pi-hole
podSecurityContext:
  # Pi-hole needs to manage files and capabilities
  runAsNonRoot: false
  fsGroup: 1000

# Node selector for pod placement
nodeSelector: {}

# Tolerations for pod scheduling
tolerations: []

# Affinity rules
affinity:
  # Prefer to schedule pods on different nodes for HA
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - pihole
        topologyKey: kubernetes.io/hostname

# Health checks
livenessProbe:
  enabled: true
  httpGet:
    path: /admin/
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /admin/
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Service Monitor for Prometheus (optional)
serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  interval: 30s

# Additional labels for all resources
labels: {}

# Additional annotations for all resources
annotations: {}

# Strategy for StatefulSet updates
strategy:
  type: RollingUpdate
  rollingUpdate:
    partition: 0