replicaCount: 1

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

image:
  repository: sports-scores-api
  tag: "0.0.1"
  pullPolicy: IfNotPresent

config:
  APP_NAME: "sports-scores"
  LOG_LEVEL: "INFO"
  LOG_JSON: "false"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "sportscores"
  PGUSER: "sportadmin"

secrets:
  PGPASSWORD: ""

service:
  type: NodePort
  port: 8000
  targetPort: 8000
  nodePort: 30081
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: sports-scores.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 995
  fsGroup: 995

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  enabled: true
  httpGet:
    path: /liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /readiness
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

labels: {}
annotations: {}

strategy:
  type: RollingUpdate

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}